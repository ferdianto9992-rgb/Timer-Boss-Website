<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Boss Respawn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-yellow-400 mb-2 flex items-center justify-center gap-3">
                <i class="fa-solid fa-clock"></i> Timer Boss Respawn
            </h1>
            <p class="text-gray-400">Sinkron penuh dengan Bot Discord • WIB / PHT</p>
            <div id="status" class="text-center text-sm text-green-400 mt-2">✅ Data terbaru dimuat</div>
        </header>

        <div id="bossList" class="grid gap-4">
            <div class="text-center text-gray-400 py-10">Menyiapkan jadwal...</div>
        </div>

        <footer class="text-center text-gray-500 text-sm mt-10">
            Data diperbarui setiap 30 detik • Diurutkan dari yang paling dekat muncul
        </footer>
    </div>

    <script>
        // Pengaturan Umum
        const BATAS_ALARM_10M = 10;
        const BATAS_ALARM_5M = 5;
        const LAMA_ALARM_DETIK = 10;
        const SUDAH_ALARM = new Set();
        const JSON_URL = "https://raw.githubusercontent.com/ferdianto9992-rgb/BotDiscord2/main/database.json";

        // Logo Boss
        const bossLogos = {
            "Venatus": "https://i.imgur.com/yHNzBn5.png",
            "Viorent": "https://i.imgur.com/TswLUyO.png",
            "LadyDalia": "https://i.imgur.com/Ymj0pme.png",
            "Ego": "https://i.imgur.com/GCpkvSV.png",
            "Shuliar": "https://i.imgur.com/WJth2tj.png",
            "Larba": "https://i.imgur.com/qU8cRSB.png",
            "Catena": "https://i.imgur.com/ohqX4Nb.png",
            "Livera": "https://i.imgur.com/tFk6gsk.png",
            "Undomiel": "https://i.imgur.com/0GGCNSX.png",
            "Araneo": "https://i.imgur.com/dEVVKXQ.png",
            "Wannitas": "https://i.imgur.com/tU8BVxj.png",
            "Metus": "https://i.imgur.com/SuI2aF9.png",
            "Duplican": "https://i.imgur.com/t2PWifB.png",
            "BaronBraudmore": "https://i.imgur.com/or3ALPa.png",
            "Gareth": "https://i.imgur.com/VM84PLk.png",
            "Amentis": "https://i.imgur.com/hUNJOmi.png",
            "Titore": "https://i.imgur.com/W32BUjq.png",
            "GeneralAquleus": "https://i.imgur.com/oFBMgUH.png",
            "Ordo": "https://i.imgur.com/WpLtlty.png",
            "Asta": "https://i.imgur.com/69XDCoj.png",
            "Secreta": "https://i.imgur.com/69XDCoj.png",
            "Supore": "https://i.imgur.com/syRfEwZ.png",
            "Clemantis": "https://i.imgur.com/go33dw7.png",
            "Thymele": "https://i.imgur.com/WJth2tj.png",
            "Libitina": "https://i.imgur.com/3GLGwuh.png",
            "Saphirus": "https://i.imgur.com/846DHtQ.png",
            "Neutro": "https://i.imgur.com/DokfQus.png",
            "Rakajeth": "https://i.imgur.com/2o62mvK.png",
            "Auraq": "https://i.imgur.com/R4mb23X.png",
            "Roderick": "https://i.imgur.com/S2mUejm.png",
            "Milavy": "https://i.imgur.com/rgVWDrk.png",
            "Ringor": "https://i.imgur.com/wg3j2wF.png",
            "Chainflock": "https://i.imgur.com/GDiYhBn.png",
            "Chaiflock": "https://i.imgur.com/GDiYhBn.png",
            "Tumier": "https://i.imgur.com/DyhlgGo.png",
            "Benji": "https://i.imgur.com/BqkyQNy.png"
        };

        // Alarm & Notifikasi
        function putarAlarm(namaBoss, pesan) {
            if (SUDAH_ALARM.has(pesan)) return;
            SUDAH_ALARM.add(pesan);
            const audio = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-alarm-digital-notification-933.mp3");
            audio.volume = 0.7;
            audio.loop = true;
            audio.play().catch(e => console.log("Izinkan suara:", e));
            tampilkanNotifikasi(pesan);
            setTimeout(() => { audio.pause(); audio.currentTime = 0; }, LAMA_ALARM_DETIK * 1000);
            setTimeout(() => SUDAH_ALARM.delete(pesan), 15 * 60 * 1000);
        }

        function tampilkanNotifikasi(teks) {
            const notif = document.createElement('div');
            notif.className = "fixed top-5 right-5 bg-yellow-500 text-black font-bold px-5 py-3 rounded-lg shadow-lg z-50 animate-pulse";
            notif.textContent = teks;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 12000);
        }

        // Hitung jadwal Fixed
        function getNextFixedTime(hariTujuan, jamTujuan, menitTujuan) {
            const sekarangWIB = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Jakarta" }));
            const waktu = new Date(sekarangWIB);
            waktu.setHours(jamTujuan, menitTujuan, 0, 0);
            let selisihHari = hariTujuan - sekarangWIB.getDay();
            if (selisihHari < 0 || (selisihHari === 0 && waktu <= sekarangWIB)) selisihHari += 7;
            waktu.setDate(sekarangWIB.getDate() + selisihHari);
            return waktu;
        }

        // Ambil & Proses Data
        async function loadData() {
            try {
                const res = await fetch(JSON_URL + "?t=" + Date.now());
                if (!res.ok) throw new Error("Gagal membaca data");
                const data = await res.json();
                prosesData(data);
                document.getElementById('status').textContent = "✅ Data terbaru dimuat";
                document.getElementById('status').className = "text-center text-sm text-green-400 mt-2";
            } catch (err) {
                document.getElementById('status').textContent = `❌ ${err.message}`;
                document.getElementById('status').className = "text-center text-sm text-red-400 mt-2";
            }
        }

        function prosesData(data) {
            const sekarangWIB = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Jakarta" }));
            const semuaBoss = [];

            // Proses Boss Interval
            for (const [nama, info] of Object.entries(data.boss_respawn)) {
                if (!info || !info.terakhir_muncul) continue;

                const waktuMatiUTC = new Date(info.terakhir_muncul);
                const intervalMs = info.interval_jam * 3600000;
                let waktuSpawnUTC = new Date(waktuMatiUTC.getTime() + intervalMs);

                while (waktuSpawnUTC < new Date()) {
                    waktuSpawnUTC = new Date(waktuSpawnUTC.getTime() + intervalMs);
                }

                semuaBoss.push({
                    nama: nama,
                    waktuSpawn: waktuSpawnUTC,
                    interval: info.interval_jam,
                    isFixed: false
                });
            }

            // Proses Boss Fixed
            for (const [nama, jadwalList] of Object.entries(data.boss_fixed)) {
                for (const jadwal of jadwalList) {
                    const [jam, menit] = jadwal.waktu.split(":").map(Number);
                    const waktuBerikutnya = getNextFixedTime(jadwal.hari, jam, menit);
                    semuaBoss.push({
                        nama: nama,
                        waktuSpawn: waktuBerikutnya,
                        interval: "Tetap",
                        isFixed: true
                    });
                }
            }

            // ✅ URUTKAN: Dari waktu terdekat ke terlama
            semuaBoss.sort((a, b) => a.waktuSpawn - b.waktuSpawn);

            renderTampilan(semuaBoss, sekarangWIB);
        }

        // Tampilkan ke Halaman
        function renderTampilan(daftarBoss, sekarangWIB) {
            const wadah = document.getElementById('bossList');
            const batas10m = BATAS_ALARM_10M * 60 * 1000;
            const batas5m = BATAS_ALARM_5M * 60 * 1000;

            if (!daftarBoss.length) {
                wadah.innerHTML = `<div class="text-center text-gray-400 py-10">Belum ada jadwal tersedia</div>`;
                return;
            }

            wadah.innerHTML = daftarBoss.map(bos => {
                let selisihMs, jam, menit, detik, strWIB, strPHT;

                if (!bos.isFixed) {
                    selisihMs = Math.max(0, bos.waktuSpawn - sekarangWIB);
                    strWIB = bos.waktuSpawn.toLocaleTimeString("id-ID", { timeZone: "Asia/Jakarta", hour: "2-digit", minute: "2-digit", hour12: false });
                    strPHT = bos.waktuSpawn.toLocaleTimeString("id-ID", { timeZone: "Asia/Manila", hour: "2-digit", minute: "2-digit", hour12: false });
                } else {
                    selisihMs = Math.max(0, bos.waktuSpawn - sekarangWIB);
                    strWIB = bos.waktuSpawn.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit", hour12: false });
                    strPHT = new Date(bos.waktuSpawn.getTime() + 3600000).toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit", hour12: false });
                }

                jam = Math.floor(selisihMs / 3600000);
                menit = Math.floor((selisihMs % 3600000) / 60000);
                detik = Math.floor((selisihMs % 60000) / 1000);

                // Cek alarm
                if (selisihMs > 0 && selisihMs <= batas10m && selisihMs > batas5m) {
                    putarAlarm(bos.nama, `⏰ ${bos.nama} muncul dalam 10 menit!`);
                } else if (selisihMs > 0 && selisihMs <= batas5m) {
                    putarAlarm(bos.nama, `⚠️ ${bos.nama} muncul dalam 5 menit!`);
                }

                const mundur = selisihMs <= 0 ? "✅ SUDAH MUNCUL!" : `${jam}j ${menit.toString().padStart(2, "0")}m ${detik.toString().padStart(2, "0")}s`;
                const warna = selisihMs <= 0 ? "text-green-400" : selisihMs <= 5 * 60000 ? "text-red-400" : selisihMs <= 10 * 60000 ? "text-orange-400" : "text-yellow-300";
                const logo = bossLogos[bos.nama] || "https://cdn-icons-png.flaticon.com/512/1698/1698535.png";
                const label = bos.isFixed 
                    ? `<span class="text-xs bg-purple-700 px-2 py-0.5 rounded text-purple-100">FIXED</span>` 
                    : `<span class="text-xs bg-blue-700 px-2 py-0.5 rounded text-blue-100">INTERVAL</span>`;
                const garis = bos.isFixed ? "border-purple-500" : "border-blue-500";

                return `
                <div class="bg-gray-800 rounded-lg p-5 shadow-md border-l-4 ${garis} flex items-center gap-4">
                    <img src="${logo}" alt="${bos.nama}" class="w-16 h-16 object-contain rounded-md bg-gray-700 p-1">
                    <div class="flex-1">
                        <h3 class="text-xl font-semibold text-white flex items-center gap-2">${bos.nama} ${label}</h3>
                        <p class="text-sm text-gray-400">Interval: ${bos.interval} jam</p>
                        <p class="mt-1 text-sm">ID: ${strWIB} WIB &nbsp;&nbsp; PH: ${strPHT} PHT</p>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-bold ${warna} whitespace-nowrap">${mundur}</p>
                    </div>
                </div>`;
            }).join("");
        }

        // Jalankan Pembaruan Otomatis
        loadData();
        setInterval(() => renderTampilan(document.querySelectorAll(".bg-gray-800")?.length ? null : [], new Date()), 1000);
        setInterval(loadData, 30000);
    </script>
</body>
</html>
